{% extends 'base.html' %}
{% block title %}Novo cliente · Atacarejo Insights{% endblock %}
{% block content %}
<header class="page-header">
  <div>
    <p class="eyebrow">Cadastro</p>
    <h1>Novo cliente</h1>
    <p>Registre a empresa para iniciar diagnóstico, contrato e projeto.</p>
  </div>
</header>
<section class="panel">
  <form method="post" class="form-grid">
    <label>Nome da empresa<input name="name" required></label>
    <label>CNPJ<input name="cnpj"></label>
    <label>Segmento<input name="segment" placeholder="Supermercado, atacarejo, distribuidor..."></label>
    <label>Cidade<input name="city"></label>
    <label>Estado<input name="state" maxlength="2" placeholder="PE"></label>
    <label>Número de lojas<input name="stores" type="number" min="0" value="0"></label>
    <label>Faturamento mensal estimado<input name="monthly_revenue" type="number" step="0.01" min="0" value="0"></label>
    <label>Responsável<input name="contact_name"></label>
    <label>E-mail do responsável<input name="contact_email" type="email"></label>
    <label>Status
      <select name="status">
        <option>Prospecção</option>
        <option selected>Diagnóstico</option>
        <option>Execução</option>
        <option>Finalização</option>
        <option>Encerrado</option>
      </select>
    </label>
    <div class="form-actions"><button class="btn-primary" type="submit">Salvar cliente</button></div>
  </form>
</section>
{% endblock %}
